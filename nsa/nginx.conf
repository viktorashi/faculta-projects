events {
    worker_connections 1024;
}

http {
    upstream web_backend {
        # Docker's internal DNS will resolve the service name 'web' to the IP addresses of all replicas
        server web:8000;
    }

    access_log /var/log/nginx/access_file.log;

    server {
        listen 80;

        location / {
            proxy_pass http://web_backend;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name localhost viktora.sh;

        ssl_certificate /etc/nginx/certs/viktora.sh.pem;
        ssl_certificate_key /etc/nginx/certs/viktora.sh-key.pem;

        location / {
            proxy_pass http://web_backend;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 8081;
        server_name localhost viktora.sh;

        location / {
            root /var/log/nginx;
            index report.html;
        }
    }
}
